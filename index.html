function sm2(c,q){let{easeFactor:e=2.5,interval:i=0,repetitions:r=0}=c;if(q>=3){if(r===0)i=1;else if(r===1)i=6;else i=Math.round(i*e);r++}else{r=0;i=1}e=Math.max(1.3,e+(0.1-(5-q)*(0.08+(5-q)*0.02)));const n=new Date;n.setDate(n.getDate()+i);return{easeFactor:e,interval:i,repetitions:r,nextReview:n.toISOString()}}

function detectLang(t){const w=t.toLowerCase().replace(/[^a-záàâãéèêíïóôõöúüçñß\s'-]/g,"").split(/\s+/).filter(x=>x.length>0);if(w.length<10)return"en";const s=w.slice(0,500),sc={};for(const[l,f]of Object.entries(FP)){const st=new Set(f);sc[l]=s.filter(x=>st.has(x)).length}const b=Object.entries(sc).sort((a,b)=>b[1]-a[1]);return b[0][1]===0?"en":b[0][0]}

async function translateText(text,srcL,cache){const key=srcL+':'+text.toLowerCase().trim();if(cache[key])return{...cache[key],fromCache:true};const r={translation:"",definition:"",example:"",exampleTranslation:"",fromCache:false};try{const res=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${srcL}|es`);const d=await res.json();if(d.responseData?.translatedText)r.translation=d.responseData.translatedText;if(d.matches?.length>1){const a=d.matches.find(m=>m.translation!==r.translation&&m.quality&&parseInt(m.quality)>50);if(a)r.definition='También: '+a.translation}}catch{r.translation="Error al traducir"}
if(srcL==="en"){try{const c=text.trim().toLowerCase().replace(/[^a-z'-]/g,"");if(c&&!c.includes(" ")){const dr=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(c)}`);if(dr.ok){const dd=await dr.json(),m=dd?.[0]?.meanings?.[0],d=m?.definitions?.[0];if(d?.definition){try{const tr=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(d.definition)}&langpair=en|es`);r.definition=(await tr.json()).responseData?.translatedText||d.definition}catch{r.definition=d.definition}}if(d?.example){r.example=d.example;try{const er=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(d.example)}&langpair=en|es`);r.exampleTranslation=(await er.json()).responseData?.translatedText||""}catch{}}}}}catch{}}
cache[key]={translation:r.translation,definition:r.definition,example:r.example,exampleTranslation:r.exampleTranslation};return r}

async function extractPdf(file){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';const b=await file.arrayBuffer(),p=await pdfjsLib.getDocument({data:b}).promise;let t='';for(let i=1;i<=p.numPages;i++){const pg=await p.getPage(i),c=await pg.getTextContent();t+=c.items.map(x=>x.str).join(' ')+'\n\n'}return t.trim()}

function speak(text,lang){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=LANG_VOICE[lang]||'en-US';u.rate=0.85;speechSynthesis.speak(u)}

function exportCSV(){const rows=[['Palabra','Idioma','Nivel','Traducción','Nota','Etiquetas','Texto origen','Fecha']];for(const[k,v]of Object.entries(S.vocabulary)){const src=S.library.find(t=>t.id===v.sourceTextId);rows.push([v.word,LANGS[v.language]||v.language,LEVELS[v.level]?.label||v.level,v.translation||'',v.note||'',(v.tags||[]).join('; '),src?.title||'',v.dateAdded||''])}
const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='vocabulario-linguareader.csv';a.click();URL.revokeObjectURL(url);showToast('Vocabulario exportado a CSV')}

function todayStr(){return new Date().toISOString().slice(0,10)}
function getStreak(history){if(!history||!history.length)return 0;const sorted=[...new Set(history)].sort().reverse();let streak=0;const today=new Date();today.setHours(0,0,0,0);for(let i=0;i<sorted.length;i++){const d=new Date(sorted[i]);d.setHours(0,0,0,0);const diff=Math.round((today-d)/(86400000));if(diff===i)streak++;else break}return streak}

// ── Firestore helpers ──
function userDoc(p){return db.collection('users').doc(auth.currentUser.uid).collection('data').doc(p)}
function textsCol(){return db.collection('users').doc(auth.currentUser.uid).collection('texts')}
let saveT={};
function dbSave(k,d,merge){clearTimeout(saveT[k]);saveT[k]=setTimeout(()=>{userDoc(k).set(d,merge?{merge:true}:{}).catch(e=>console.error('DB:',e))},500)}
function saveLib(){dbSave('library',{items:S.library})}
function saveVoc(){dbSave('vocabulary',{entries:S.vocabulary},false)}
function saveFc(){dbSave('flashcards',{entries:S.flashcards},false)}
function saveCa(){dbSave('cache',{entries:S.cache},true)}
function savePrefs(){dbSave('prefs',{darkMode:S.darkMode,fontSize:S.fontSize},true)}
function saveStreak(){dbSave('streak',{history:S.streakHistory},true)}
function savePositions(){dbSave('positions',{entries:S.readingPositions},true)}
async function saveTxt(id,text){await textsCol().doc(id).set({content:text})}
async function delTxt(id){await textsCol().doc(id).delete().catch(()=>{})}

async function loadAll(){try{const[lib,voc,fc,ca,prefs,strk,pos]=await Promise.all([userDoc('library').get(),userDoc('vocabulary').get(),userDoc('flashcards').get(),userDoc('cache').get(),userDoc('prefs').get(),userDoc('streak').get(),userDoc('positions').get()]);
S.library=lib.exists?lib.data().items||[]:[];S.vocabulary=voc.exists?voc.data().entries||{}:{};S.flashcards=fc.exists?fc.data().entries||{}:{};S.cache=ca.exists?ca.data().entries||{}:{};
if(prefs.exists){S.darkMode=prefs.data().darkMode||false;S.fontSize=prefs.data().fontSize||17}
if(strk.exists)S.streakHistory=strk.data().history||[];
if(pos.exists)S.readingPositions=pos.data().entries||{};
S.texts={};const ts=await textsCol().get();ts.forEach(d=>{S.texts[d.id]=d.data().content});
const b=S.library.length;S.library=S.library.filter(i=>S.texts[i.id]);if(S.library.length<b)saveLib()}catch(e){console.error('Load:',e)}}

async function doRegister(e,p,n){setState({authLoading:true,authError:''});try{const c=await auth.createUserWithEmailAndPassword(e,p);await c.user.updateProfile({displayName:n});await userDoc('profile').set({name:n,email:e})}catch(e){const m={'auth/email-already-in-use':'Email ya registrado','auth/weak-password':'Mínimo 6 caracteres','auth/invalid-email':'Email inválido'};setState({authError:m[e.code]||e.message,authLoading:false})}}
async function doLogin(e,p){setState({authLoading:true,authError:''});try{await auth.signInWithEmailAndPassword(e,p)}catch(e){const m={'auth/user-not-found':'No existe cuenta','auth/wrong-password':'Contraseña incorrecta','auth/invalid-email':'Email inválido','auth/invalid-credential':'Email o contraseña incorrectos'};setState({authError:m[e.code]||e.message,authLoading:false})}}
async function doResetPassword(email){if(!email||!email.trim()){setState({authError:'Escribe tu email primero'});return}setState({authLoading:true,authError:''});try{await auth.sendPasswordResetEmail(email.trim());setState({authLoading:false,authError:''});showToast('Se envió un enlace de recuperación a '+email.trim())}catch(e){const m={'auth/user-not-found':'No existe cuenta con ese email','auth/invalid-email':'Email inválido'};setState({authError:m[e.code]||e.message,authLoading:false})}}
function doLogout(){auth.signOut();Object.assign(S,{view:'library',library:[],texts:{},vocabulary:{},flashcards:{},cache:{},currentTextId:null,popup:null})}

async function handleFile(e){const f=e.target?.files?.[0];if(!f)return;setState({loading:true});try{let t='';if(f.name.toLowerCase().endsWith('.pdf'))t=await extractPdf(f);else t=await f.text();if(!t.trim()){alert('Sin texto');setState({loading:false});return}
addText(f.name.replace(/\.(pdf|txt|text)$/i,''),t)}catch(er){alert('Error: '+er.message);setState({loading:false})}e.target.value=''}

function addText(title,text){const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);const preview=text.slice(0,150).replace(/\s+/g,' ');const words=text.split(/\s+/).filter(Boolean).length;const lang=detectLang(text);
S.library.unshift({id,title,preview,wordCount:words,dateAdded:new Date().toISOString(),language:lang});S.texts[id]=text;saveLib();saveTxt(id,text);setState({loading:false,currentTextId:id,view:'reader'});showToast(`"${title}" — ${words.toLocaleString()} palabras (${LANGS[lang]})`)}

function deleteText(id){S.library=S.library.filter(i=>i.id!==id);delete S.texts[id];saveLib();delTxt(id);if(S.currentTextId===id)S.currentTextId=null;setState({view:'library',confirmAction:null})}
function setTextLang(id,l){S.library=S.library.map(i=>i.id===id?{...i,language:l}:i);saveLib();render()}

async function handleTranslate(t){const m=S.library.find(x=>x.id===S.currentTextId);setState({translating:true});const r=await translateText(t,m?.language||'en',S.cache);saveCa();S.popup={...S.popup,translation:r,fromCache:r.fromCache};setState({translating:false})}

async function translateVocabWord(vocKey){const v=S.vocabulary[vocKey];if(!v)return;setState({translating:vocKey});const r=await translateText(v.word,v.language,S.cache);saveCa();v.translation=r.translation||v.translation;if(r.definition&&!v.note)v.note=r.definition;if(r.example&&!v.example)v.example=r.example;if(r.exampleTranslation&&!v.exampleTranslation)v.exampleTranslation=r.exampleTranslation;v.dateModified=new Date().toISOString();saveVoc();setState({translating:false})}

function saveWord(text,level){const m=S.library.find(t=>t.id===S.currentTextId);const lang=m?.language||'en';const k=lang+':'+text.toLowerCase().trim();const ex=S.vocabulary[k]||{};const tr=S.popup?.translation;
S.vocabulary[k]={...ex,word:text.trim(),language:lang,level,note:ex.note||(tr?.translation?tr.translation+(tr.definition?' — '+tr.definition:''):''),translation:tr?.translation||ex.translation||'',example:tr?.example||ex.example||'',exampleTranslation:tr?.exampleTranslation||ex.exampleTranslation||'',tags:ex.tags||[],sourceTextId:ex.sourceTextId||S.currentTextId,dateAdded:ex.dateAdded||new Date().toISOString(),dateModified:new Date().toISOString()};
saveVoc();if(level!=='learned'&&!S.flashcards[k]){S.flashcards[k]={easeFactor:2.5,interval:0,repetitions:0,nextReview:new Date().toISOString()};saveFc()}setState({popup:null})}

function recordStudy(){const today=todayStr();if(!S.streakHistory.includes(today)){S.streakHistory.push(today);saveStreak()}}

function startFc(mode){const m=mode||S.fcMode;const now=new Date();const deck=Object.keys(S.flashcards).filter(k=>{const v=S.vocabulary[k];if(!v||v.level==='learned')return false;if(S.fcLangFilter!=='all'&&v.language!==S.fcLangFilter)return false;if(m==='due'){const fc=S.flashcards[k];return!fc.nextReview||new Date(fc.nextReview)<=now}return true});deck.sort(()=>Math.random()-.5);setState({flashcardDeck:deck,fcIndex:0,fcFlipped:false,fcMode:m})}

function answerFc(q){const k=S.flashcardDeck[S.fcIndex];S.flashcards[k]=sm2(S.flashcards[k]||{},q);saveFc();if(q>=3&&S.vocabulary[k]){S.vocabulary[k].level=q===5?'learned':'recognized';saveVoc()}recordStudy();
if(S.fcIndex+1<S.flashcardDeck.length)setState({fcIndex:S.fcIndex+1,fcFlipped:false});else setState({flashcardDeck:[],fcFlipped:false})}

function wordStyle(w,l){const k=l+':'+w.toLowerCase().trim().replace(/[.,;:!?¿¡"""''()\[\]{}]/g,'');const v=S.vocabulary[k];if(!v)return'';return`background:${LEVELS[v.level]?.bg};border-radius:3px;padding:0 2px;`}

function saveReadPos(){const ra=document.getElementById('reader-area');if(ra&&S.currentTextId){const pct=ra.scrollHeight>ra.clientHeight?ra.scrollTop/(ra.scrollHeight-ra.clientHeight):0;S.readingPositions[S.currentTextId]=pct;savePositions()}}
function restoreReadPos(){const ra=document.getElementById('reader-area');if(ra&&S.currentTextId&&S.readingPositions[S.currentTextId]!=null){const pct=S.readingPositions[S.currentTextId];setTimeout(()=>{ra.scrollTop=pct*(ra.scrollHeight-ra.clientHeight)},100)}}

function cleanOrphanedFlashcards(){let cleaned=false;for(const k of Object.keys(S.flashcards)){if(!S.vocabulary[k]){delete S.flashcards[k];cleaned=true}}if(cleaned)saveFc()}

function getStats(){cleanOrphanedFlashcards();const it=Object.values(S.vocabulary);const now=new Date();return{total:it.length,unknown:it.filter(v=>v.level==='unknown').length,recognized:it.filter(v=>v.level==='recognized').length,learned:it.filter(v=>v.level==='learned').length,dueToday:Object.keys(S.flashcards).filter(k=>{const v=S.vocabulary[k];if(!v||v.level==='learned')return false;const f=S.flashcards[k];return!f.nextReview||new Date(f.nextReview)<=now}).length,allCards:Object.keys(S.flashcards).filter(k=>{const v=S.vocabulary[k];return v&&v.level!=='learned'}).length}}

function getComprehension(textId){const text=S.texts[textId]||'';const meta=S.library.find(t=>t.id===textId);const lang=meta?.language||'en';const words=text.toLowerCase().replace(/[^a-záàâãéèêíïóôõöúüçñß\s'-]/g,'').split(/\s+/).filter(w=>w.length>1);if(!words.length)return{known:0,total:0,pct:0};const unique=new Set(words);let known=0;for(const w of unique){const k=lang+':'+w;if(S.vocabulary[k]&&(S.vocabulary[k].level==='recognized'||S.vocabulary[k].level==='learned'))known++}return{known,total:unique.size,pct:unique.size?Math.round(known/unique.size*100):0}}

function getWeeklyData(){const weeks=[];const now=new Date();for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);const added=Object.values(S.vocabulary).filter(v=>v.dateAdded?.slice(0,10)===ds).length;const learned=Object.values(S.vocabulary).filter(v=>v.dateModified?.slice(0,10)===ds&&v.level==='learned').length;weeks.push({date:ds,day:['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][d.getDay()],added,learned})}return weeks}

function addTag(vocKey,tag){if(!tag.trim())return;const v=S.vocabulary[vocKey];if(!v)return;if(!v.tags)v.tags=[];const t=tag.trim().toLowerCase();if(!v.tags.includes(t)){v.tags.push(t);saveVoc()}setState({showTagModal:null,tagInput:''})}
function removeTag(vocKey,tag){const v=S.vocabulary[vocKey];if(!v||!v.tags)return;v.tags=v.tags.filter(t=>t!==tag);saveVoc();render()}

function getAllTags(){const tags=new Set();for(const v of Object.values(S.vocabulary)){if(v.tags)v.tags.forEach(t=>tags.add(t))}return[...tags].sort()}

// Texts comprehension
h+=`<div class="card"><h3 style="font-size:15px;font-weight:600;margin-bottom:16px">Comprensión por texto</h3>`;
for(const it of S.library){const c=getComprehension(it.id);h+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%">${it.title}</span><span style="color:${c.pct>60?LEVELS.learned.color:c.pct>30?LEVELS.recognized.color:LEVELS.unknown.color};font-weight:600">${c.pct}%</span></div><div style="background:var(--border);border-radius:6px;height:8px;overflow:hidden"><div style="background:${c.pct>60?LEVELS.learned.color:c.pct>30?LEVELS.recognized.color:LEVELS.unknown.color};height:100%;border-radius:6px;width:${c.pct}%;transition:width .5s"></div></div></div>`}
if(!S.library.length)h+=`<p style="color:var(--text3);font-size:14px;text-align:center">Sube textos para ver tu comprensión</p>`;
h+=`</div></div>`}

h+=`</main>`;

// ── POPUP ──
if(S.popup){h+=`<div class="overlay" onclick="if(event.target===this)setState({popup:null})"><div class="card" style="width:100%;max-width:420px;margin:0 16px 16px;animation:slideUp .25s;max-height:80vh;overflow:auto" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="font-size:14px;font-weight:600;color:var(--text3);text-transform:uppercase">${S.popup.isPhrase?'Frase':'Palabra'}</h3><div style="display:flex;gap:4px"><button class="btn-ghost btn-sm" onclick="speak('${S.popup.text.replace(/'/g,"\\'")}','${(S.library.find(t=>t.id===S.currentTextId)?.language)||'en'}')">${I.vol}</button><button class="btn-ghost" onclick="setState({popup:null})" style="padding:4px">${I.x}</button></div></div><div style="font-size:24px;font-weight:600;font-family:'Crimson Pro',serif;margin-bottom:16px">${S.popup.text}</div>`;
if(!S.popup.translation)h+=`<button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:16px" ${S.translating?'disabled':''} onclick="handleTranslate('${S.popup.text.replace(/'/g,"\\'")}')">${S.translating?I.load+' Traduciendo...':I.globe+' Traducir'}</button>`;
if(S.popup.translation)h+=`<div style="background:var(--bg3);border-radius:12px;padding:16px;margin-bottom:16px;animation:fadeIn .3s"><div style="font-size:13px;font-weight:600;color:#4D8B52;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:8px">Traducción${S.popup.fromCache?' <span style="font-size:10px;font-weight:500;color:var(--text4);text-transform:none;background:var(--border);padding:2px 8px;border-radius:10px">caché</span>':''}</div><div style="font-size:18px;font-weight:500;margin-bottom:8px">${S.popup.translation.translation}</div>${S.popup.translation.definition?`<div style="font-size:14px;color:var(--text2);margin-bottom:8px">${S.popup.translation.definition}</div>`:''}${S.popup.translation.example?`<div style="font-size:13px;color:var(--text3);border-top:1px solid var(--border);padding-top:8px;margin-top:8px"><strong>Ejemplo:</strong> ${S.popup.translation.example}${S.popup.translation.exampleTranslation?'<br><span style="color:var(--text4)">'+S.popup.translation.exampleTranslation+'</span>':''}</div>`:''}</div>`;
h+=`<div><div style="font-size:13px;font-weight:600;color:var(--text3);margin-bottom:8px">Guardar como:</div><div style="display:flex;gap:8px">${Object.entries(LEVELS).map(([k,v])=>`<button class="btn" style="flex:1;background:${v.bg};color:${v.color};padding:10px 8px;font-size:13px;justify-content:center;border:2px solid ${v.color}30" onclick="saveWord('${S.popup.text.replace(/'/g,"\\'")}','${k}')">${v.label}</button>`).join('')}</div></div></div></div>`}

// ── PASTE MODAL ──
if(S.showPasteModal){h+=`<div class="overlay" onclick="if(event.target===this)setState({showPasteModal:false})"><div class="card" style="width:100%;max-width:500px;margin:0 16px 16px;animation:slideUp .25s" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="font-size:16px;font-weight:600">Pegar texto</h3><button class="btn-ghost" onclick="setState({showPasteModal:false})" style="padding:4px">${I.x}</button></div><div style="margin-bottom:12px"><input class="input" id="paste-title" placeholder="Título del texto" value="${S.pasteTitle}"></div><div style="margin-bottom:12px"><select class="input" id="paste-lang">${Object.entries(LANGS).map(([k,v])=>`<option value="${k}" ${k===S.pasteLang?'selected':''}>${v}</option>`).join('')}</select></div><div style="margin-bottom:16px"><textarea class="input" id="paste-text" placeholder="Pega aquí el texto en otro idioma..." rows="8">${S.pasteText}</textarea></div><button class="btn btn-primary" style="width:100%;justify-content:center" onclick="var t=document.getElementById('paste-text').value,ti=document.getElementById('paste-title').value,la=document.getElementById('paste-lang').value;if(!t.trim()){alert('Escribe o pega un texto');return}S.pasteLang=la;setState({showPasteModal:false,pasteText:'',pasteTitle:''});addText(ti||'Texto pegado',t)">Agregar a mi biblioteca</button></div></div>`}

// ── TAG MODAL ──
if(S.showTagModal){const allT=getAllTags();h+=`<div class="overlay" onclick="if(event.target===this)setState({showTagModal:null})"><div class="card" style="width:100%;max-width:340px;margin:0 16px 16px;animation:slideUp .25s" onclick="event.stopPropagation()"><h3 style="font-size:16px;font-weight:600;margin-bottom:16px">Agregar etiqueta</h3><div style="display:flex;gap:6px;margin-bottom:12px"><input class="input" id="tag-input" placeholder="Nueva etiqueta..." value="${S.tagInput}" oninput="S.tagInput=this.value"><button class="btn btn-primary btn-sm" onclick="addTag('${S.showTagModal}',document.getElementById('tag-input').value)">${I.check}</button></div>${allT.length?`<div style="margin-bottom:8px"><p style="font-size:12px;color:var(--text3);margin-bottom:6px">Etiquetas existentes:</p><div style="display:flex;flex-wrap:wrap;gap:4px">${allT.map(t=>`<span class="tag-pill" onclick="addTag('${S.showTagModal}','${t}')">${t}</span>`).join('')}</div></div>`:''}<button class="btn-ghost" style="width:100%;justify-content:center" onclick="setState({showTagModal:null})">Cancelar</button></div></div>`}

// ── TOAST ──
if(S.toast)h+=`<div class="toast" style="background:${S.toast.type==='error'?'#D4563A':'#4D8B52'}">${S.toast.type==='error'?'⚠ ':'✓ '}${S.toast.message}</div>`;

// ── CONFIRM ──
if(S.confirmAction)h+=`<div style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px" onclick="setState({confirmAction:null})"><div class="card" style="max-width:360px;width:100%;animation:slideUp .2s;text-align:center" onclick="event.stopPropagation()"><p style="font-size:16px;font-weight:500;margin-bottom:20px">${S.confirmAction.msg}</p><div style="display:flex;gap:10px"><button class="btn-ghost" style="flex:1;justify-content:center;padding:10px;font-size:14px" onclick="setState({confirmAction:null})">Cancelar</button><button class="btn" style="flex:1;justify-content:center;padding:10px;font-size:14px;background:#D4563A;color:white" onclick="${S.confirmAction.id?`deleteText('${S.confirmAction.id}')`:S.confirmAction.vocabKey?`delete S.vocabulary['${S.confirmAction.vocabKey}'];delete S.flashcards['${S.confirmAction.vocabKey}'];saveVoc();saveFc();setState({confirmAction:null})`:'setState({confirmAction:null})'}">Eliminar</button></div></div></div>`;

app.innerHTML=h;
// Events
const ra=document.getElementById('reader-area');
if(ra){ra.addEventListener('mouseup',handleRI);
if(S.selectMode){let selDebounce=null;const onSelChange=()=>{clearTimeout(selDebounce);selDebounce=setTimeout(()=>{if(S.view!=='reader'||!S.selectMode)return;const sel=window.getSelection();const txt=sel?.toString().trim();if(txt&&txt.length>0&&ra.contains(sel.anchorNode)){const clean=txt.replace(/^[.,;:!?¿¡"""''()\[\]{}]+|[.,;:!?¿¡"""''()\[\]{}]+$/g,'');if(clean)setState({popup:{text:clean,isPhrase:clean.includes(' ')}})}},500)};document.addEventListener('selectionchange',onSelChange);ra._selCleanup=onSelChange}
else{let tY=0,tX=0,tMoved=false;ra.addEventListener('touchstart',e=>{tY=e.touches[0].clientY;tX=e.touches[0].clientX;tMoved=false},{passive:true});ra.addEventListener('touchmove',e=>{if(Math.abs(e.touches[0].clientY-tY)>10||Math.abs(e.touches[0].clientX-tX)>10)tMoved=true},{passive:true});ra.addEventListener('touchend',e=>{if(!tMoved)setTimeout(()=>handleRI(e),50)})}
let scrollSaveT;ra.addEventListener('scroll',()=>{clearTimeout(scrollSaveT);scrollSaveT=setTimeout(saveReadPos,500)});restoreReadPos()}
for(const id of['ewi','eti','eni','tag-input']){const el=document.getElementById(id);if(el)el.focus()}
const tagI=document.getElementById('tag-input');if(tagI)tagI.addEventListener('keydown',e=>{if(e.key==='Enter')addTag(S.showTagModal,tagI.value)});
}

function handleRI(e){const sel=window.getSelection();const st=sel?.toString().trim();if(st&&st.length>1&&st.includes(' ')){setState({popup:{text:st.replace(/^[.,;:!?¿¡"""''()\[\]{}]+|[.,;:!?¿¡"""''()\[\]{}]+$/g,''),isPhrase:true}});return}const w=e.target?.closest?.('[data-word]');if(w){const clean=w.dataset.word.replace(/^[.,;:!?¿¡"""''()\[\]{}]+|[.,;:!?¿¡"""''()\[\]{}]+$/g,'');if(clean)setState({popup:{text:clean,isPhrase:false}})}}
render();
</script>
</body>
</html>
